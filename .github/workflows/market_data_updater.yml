name: Market Data Updater

on:
  schedule:
    # 每天北京时间9:00执行 (UTC时间1:00)
    - cron: '0 1 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 获取完整的git历史，用于提交
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run market data updater
      env:
        TQ_USERNAME: ${{ secrets.TQ_USERNAME }}
        TQ_PASSWORD: ${{ secrets.TQ_PASSWORD }}
      run: |
        python market_data_updater.py
    
    - name: Commit and push database
      run: |
        # 配置git用户
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加数据库文件
        git add data/market_data.db
        
        # 检查是否有变更
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          # 提交变更
          git commit -m "Update market data database [skip ci] - $(date '+%Y-%m-%d %H:%M:%S')"
          # 推送到仓库
          git push
          echo "Database committed and pushed successfully"
        fi
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs-${{ github.run_id }}
        path: logs/
        retention-days: 30
