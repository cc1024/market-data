name: Market Data Updater

on:
  schedule:
    - cron: '30 0 * * *'    # 北京时间 8:30
    - cron: '0 8 * * *'     # 北京时间 16:00
    - cron: '30 14 * * *'   # 北京时间 22:30
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run market data updater
      env:
        TQ_USERNAME: ${{ secrets.TQ_USERNAME }}
        TQ_PASSWORD: ${{ secrets.TQ_PASSWORD }}
      run: |
        python market_data_updater.py
    
    - name: Commit and push database and CSV files
      run: |
        # 配置 git 用户
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加数据库文件和CSV文件
        git add data/market_data.db
        git add data/*.csv
        
        # 检查是否有变更需要提交
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          # 提交变更
          git commit -m "Update market data [skip ci] - $(date '+%Y-%m-%d %H:%M:%S')"
          # 推送到仓库
          git push origin HEAD:${{ github.ref_name }}
          echo "Database and CSV files committed and pushed successfully"
        fi
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs-${{ github.run_id }}
        path: logs/
        retention-days: 30
