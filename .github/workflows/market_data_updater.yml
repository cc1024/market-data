name: Market Data Updater

on:
  schedule:
    - cron: '30 0 * * 1-5'    # 北京时间 8:30
    - cron: '0 8 * * 1-5'     # 北京时间 16:00
    - cron: '30 14 * * 1-5'   # 北京时间 22:30
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    # 字体缓存 - 只下载一次
    - name: Cache Chinese fonts
      id: cache-fonts
      uses: actions/cache@v4
      with:
        path: |
          /usr/share/fonts/truetype/wqy
          ~/.cache/matplotlib
        key: ${{ runner.os }}-fonts-wqy-${{ hashFiles('**/fonts-version.txt') }}
        restore-keys: |
          ${{ runner.os }}-fonts-wqy-
    
    # 只有在缓存未命中时才安装字体
    - name: Install Chinese fonts
      if: steps.cache-fonts.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-microhei fonts-wqy-zenhei
        sudo fc-cache -fv
        echo "fonts-wqy-1.0" > fonts-version.txt
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run market data updater
      env:
        TQ_USERNAME: ${{ secrets.TQ_USERNAME }}
        TQ_PASSWORD: ${{ secrets.TQ_PASSWORD }}
      run: |
        python market_data_updater.py
    
    - name: Commit and push database and CSV files
      run: |
        # 配置 git 用户
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加所有生成的文件
        git add data/market_data.db
        git add data/*.csv
        git add data/*.txt
        git add data/*.md
        git add data/charts/*.png
        
        # 检查是否有变更需要提交
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          # 提交变更
          git commit -m "Update market data and charts [skip ci] - $(date '+%Y-%m-%d %H:%M:%S')"
          # 推送到仓库
          git push origin HEAD:${{ github.ref_name }}
          echo "Database, CSV files and charts committed and pushed successfully"
        fi
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs-${{ github.run_id }}
        path: logs/
        retention-days: 30
